name: build-custom-geo

on:
  push:
    branches: [ main ]
    paths:
      - 'src/geosite/**'
      - 'build_morda_geo.py'
      - 'scripts/build.py'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24.0'
          cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Build geosite.dat only
        run: python3 scripts/build.py
      - name: Commit generated geosite.dat
        run: |
          if git diff --quiet -- dist/geosite.dat; then
            echo 'No geosite changes'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add dist/geosite.dat
          git commit -m 'build: refresh geosite.dat [skip ci]'
          git push
