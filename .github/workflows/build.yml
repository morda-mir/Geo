name: build-custom-geo

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'dist/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24.0'
          cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Build geosite.dat and geoip.dat
        run: python3 scripts/build.py
      - name: Commit generated dat files
        run: |
          if git diff --quiet -- dist; then
            echo 'No dist changes'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add dist/geosite.dat dist/geoip.dat
          git commit -m 'build: refresh dat files [skip ci]'
          git push
