name: sync-production-geoip

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'
  push:
    branches: [ main ]
    paths:
      - 'src/geoip/**'
      - 'scripts/append_custom_geoip.py'
      - '.github/workflows/sync-production-geoip.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24.0'
          cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Download production geoip.dat upstream
        run: |
          mkdir -p dist
          curl -L --fail -o dist/geoip.upstream.dat https://raw.githubusercontent.com/runetfreedom/russia-blocked-geoip/release/geoip.dat
      - name: Append custom geoip categories
        run: python3 scripts/append_custom_geoip.py
      - name: Commit synced geoip.dat
        run: |
          rm -f dist/geoip.upstream.dat
          if git diff --quiet -- dist/geoip.dat; then
            echo 'No geoip changes'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add dist/geoip.dat
          git commit -m 'sync: production geoip.dat [skip ci]'
          git push
