name: sync-production-geoip

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download production geoip.dat into this repo
        run: |
          mkdir -p dist
          curl -L --fail -o dist/geoip.dat https://raw.githubusercontent.com/runetfreedom/russia-blocked-geoip/release/geoip.dat
      - name: Commit synced geoip.dat
        run: |
          if git diff --quiet -- dist/geoip.dat; then
            echo 'No geoip changes'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add dist/geoip.dat
          git commit -m 'sync: production geoip.dat [skip ci]'
          git push
